<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CatCam - False Positives</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #ddd; font-family: system-ui, sans-serif; font-size: 15px; }
    nav { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 12px 20px; display: flex; gap: 20px; align-items: center; }
    nav a { color: #aaa; text-decoration: none; font-size: 14px; }
    nav a:hover, nav a.active { color: #fff; }
    nav .brand { color: #fff; font-weight: 600; margin-right: 10px; }
    .page { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .meta { color: #666; font-size: 13px; margin-bottom: 24px; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; }
    .card img { width: 100%; height: auto; display: block; }
    .card .info { padding: 10px 12px; font-size: 12px; color: #666; }
    .card .info strong { color: #999; }
    .empty { color: #555; padding: 60px 0; text-align: center; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">CatCam</span>
    <a href="/">Live</a>
    <a href="/clips">Clips</a>
    <a href="/false_positives" class="active">False Positives</a>
  </nav>

  <div class="page">
    <h1>False Positives</h1>
    <p class="meta">{{ fps|length }} image(s) &nbsp;·&nbsp; react ❌ in Discord to mark a detection as a false positive</p>

    {% if not fps %}
      <div class="empty">No false positives recorded.</div>
    {% else %}
    <div class="gallery">
      {% for fp in fps %}
      <div class="card">
        <img src="/false_positives/{{ fp.name }}" alt="{{ fp.label }}">
        <div class="info">
          <strong>{{ fp.label }}</strong> &nbsp;·&nbsp; {{ fp.size_kb }} KB
        </div>
      </div>
      {% endfor %}
    </div>
    {% endif %}
  </div>
</body>
</html>
